<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06131D"/>
      <stop offset="0.45" stop-color="#0B2230"/>
      <stop offset="1" stop-color="#101A26"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F2E3C" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#132231" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#43C8FF"/>
      <stop offset="1" stop-color="#0C84FF"/>
    </linearGradient>
    <linearGradient id="accentMint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#55F0C9"/>
      <stop offset="1" stop-color="#19BFA3"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFC05A"/>
      <stop offset="1" stop-color="#FF7A18"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 52px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #F5FBFF; }
      .subtitle { font: 400 22px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #B9D1DE; }
      .section { font: 700 26px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #F5FBFF; }
      .label { font: 600 18px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #DFF4FF; }
      .body { font: 400 17px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #BFD2DC; }
      .small { font: 500 15px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #9FC0CE; }
      .mono { font: 600 16px 'SF Mono', 'JetBrains Mono', 'Menlo', monospace; fill: #E8F7FF; }
      .pill { font: 700 14px 'SF Pro Text', 'Segoe UI', Arial, sans-serif; fill: #06131D; }
      .metric { font: 700 18px 'SF Pro Display', 'Segoe UI', Arial, sans-serif; fill: #F5FBFF; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1400" cy="140" r="220" fill="#12334B" fill-opacity="0.55"/>
  <circle cx="1460" cy="120" r="120" fill="#1D6D93" fill-opacity="0.22"/>
  <circle cx="170" cy="890" r="240" fill="#0C6A76" fill-opacity="0.18"/>
  <circle cx="330" cy="120" r="110" fill="#2D8AFF" fill-opacity="0.18"/>

  <rect width="1472" height="892" x="64" y="54" rx="30" fill="#0A1520" fill-opacity="0.52" stroke="#284658" stroke-opacity="0.72"/>

  <g filter="url(#softGlow)">
    <rect x="86" y="82" width="124" height="42" rx="21" fill="url(#accentMint)"/>
  </g>
  <text x="114" y="110" class="pill">AI Workflow OS</text>
  <text x="86" y="178" class="title">xdev Technical Overview</text>
  <text x="86" y="220" class="subtitle">An AI-native workflow orchestration layer for Claude Code and Windsurf</text>
  <text x="86" y="254" class="subtitle">Positioning: not a bundle of commands, but a full engineering pipeline from intent to ship</text>

  <g filter="url(#cardShadow)">
    <rect x="82" y="308" width="314" height="560" rx="28" fill="url(#panel)" stroke="#2B566B"/>
    <rect x="420" y="308" width="700" height="560" rx="28" fill="url(#panel)" stroke="#2B566B"/>
    <rect x="1144" y="308" width="374" height="560" rx="28" fill="url(#panel)" stroke="#2B566B"/>
  </g>

  <text x="108" y="350" class="section">01 Input Layer</text>
  <text x="108" y="378" class="body">Goal in, workflow out.</text>

  <rect x="108" y="408" width="262" height="82" rx="20" fill="#10212D" stroke="#2C5166"/>
  <text x="128" y="438" class="mono">/xdev:full-dev</text>
  <text x="128" y="466" class="body">New features and large refactors</text>

  <rect x="108" y="506" width="262" height="82" rx="20" fill="#10212D" stroke="#2C5166"/>
  <text x="128" y="536" class="mono">/xdev:bugfix</text>
  <text x="128" y="564" class="body">Bugs, crashes, unexpected behavior</text>

  <rect x="108" y="604" width="262" height="82" rx="20" fill="#10212D" stroke="#2C5166"/>
  <text x="128" y="634" class="mono">/xdev:iterate</text>
  <text x="128" y="662" class="body">Small tweaks, optimizations, config updates</text>

  <rect x="108" y="702" width="262" height="82" rx="20" fill="#10212D" stroke="#2C5166"/>
  <text x="128" y="732" class="mono">/xdev:map</text>
  <text x="128" y="760" class="body">Codebase snapshot for faster cold starts</text>

  <rect x="108" y="808" width="262" height="38" rx="19" fill="#173446"/>
  <text x="127" y="833" class="small">Input format: natural language + slash command</text>

  <text x="446" y="350" class="section">02 Orchestration Engine</text>
  <text x="446" y="378" class="body">Routing, parallelism, gates, and failure loops.</text>

  <rect x="446" y="408" width="226" height="112" rx="22" fill="#102635" stroke="#2F6A84"/>
  <rect x="690" y="408" width="226" height="112" rx="22" fill="#102635" stroke="#2F6A84"/>
  <rect x="934" y="408" width="220" height="112" rx="22" fill="#102635" stroke="#2F6A84"/>

  <text x="466" y="442" class="label">Complexity Triage</text>
  <text x="466" y="470" class="body">Auto-selects S1 / S2 / S3</text>
  <text x="466" y="494" class="body">or full-dev / iterate flows</text>

  <text x="710" y="442" class="label">Dependency Graph</text>
  <text x="710" y="470" class="body">Independent tasks go to subagents</text>
  <text x="710" y="494" class="body">Blocked tasks stay sequential</text>

  <text x="954" y="442" class="label">Quality Gates</text>
  <text x="954" y="470" class="body">Tests, health, QA, and review</text>
  <text x="954" y="494" class="body">must pass before advancing</text>

  <path d="M672 464H688" stroke="url(#accentBlue)" stroke-width="4" stroke-linecap="round"/>
  <path d="M916 464H932" stroke="url(#accentBlue)" stroke-width="4" stroke-linecap="round"/>

  <rect x="446" y="550" width="708" height="126" rx="24" fill="#0F2030" stroke="#2B566B"/>
  <text x="472" y="586" class="label">Reliability Features</text>
  <text x="472" y="616" class="body">• Session Recovery: checkpoints in `docs/state/` allow interrupted runs to resume</text>
  <text x="472" y="644" class="body">• Structured Pass Criteria: commands, exit codes, and outputs are machine-checkable</text>

  <rect x="446" y="700" width="340" height="130" rx="24" fill="#102635" stroke="#2F6A84"/>
  <text x="472" y="736" class="label">Risk Policy</text>
  <text x="472" y="766" class="body">Red: explicit confirmation required</text>
  <text x="472" y="792" class="body">Yellow: notify, then continue</text>
  <text x="472" y="818" class="body">Green: auto-execute</text>

  <rect x="814" y="700" width="340" height="130" rx="24" fill="#102635" stroke="#2F6A84"/>
  <text x="840" y="736" class="label">Methodology Edge</text>
  <text x="840" y="766" class="body">Not just prompts, but a full delivery pipeline</text>
  <text x="840" y="792" class="body">that runs the right skills in the right order</text>

  <text x="1170" y="350" class="section">03 Output Paths</text>
  <text x="1170" y="378" class="body">Three core execution flows.</text>

  <rect x="1170" y="410" width="322" height="118" rx="22" fill="#112131" stroke="#33637A"/>
  <rect x="1184" y="422" width="88" height="28" rx="14" fill="url(#accentBlue)"/>
  <text x="1206" y="442" class="pill">FULL DEV</text>
  <text x="1204" y="480" class="metric">8-stage end to end</text>
  <text x="1204" y="508" class="small">Explore → review → TDD → quality → ship</text>

  <rect x="1170" y="550" width="322" height="118" rx="22" fill="#112131" stroke="#33637A"/>
  <rect x="1184" y="562" width="82" height="28" rx="14" fill="url(#accentOrange)"/>
  <text x="1206" y="582" class="pill">BUGFIX</text>
  <text x="1204" y="620" class="metric">S1 / S2 / S3 routing</text>
  <text x="1204" y="648" class="small">Fast, standard, and deep investigation loops</text>

  <rect x="1170" y="690" width="322" height="118" rx="22" fill="#112131" stroke="#33637A"/>
  <rect x="1184" y="702" width="82" height="28" rx="14" fill="url(#accentMint)"/>
  <text x="1205" y="722" class="pill">ITERATE</text>
  <text x="1204" y="760" class="metric">Scope-gated fast path</text>
  <text x="1204" y="788" class="small">TDD → health → QA → ship</text>

  <path d="M396 588C422 588 426 588 446 588" stroke="url(#accentMint)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1120 588C1140 588 1144 588 1170 588" stroke="url(#accentMint)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="438,578 458,588 438,598" fill="#3FE2BE"/>
  <polygon points="1162,578 1182,588 1162,598" fill="#3FE2BE"/>

  <g opacity="0.9">
    <rect x="86" y="892" width="1428" height="34" rx="17" fill="#10212D" stroke="#27485C"/>
    <text x="112" y="915" class="small">Foundation stack: gstack + superpowers + frontend-design / ui-ux-pro-max, orchestrated by xdev into one delivery pipeline; plans live in `docs/plans/`, state lives in `docs/state/`.</text>
  </g>
</svg>
